<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Наши проекты - KristallCommunity</title>
    <link rel="icon" type="image/png" href="favicon.png" />
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- НАВИГАЦИЯ (HEADER) -->
    <header>
        <div class="container header-wrapper">
            <!-- Ссылка на логотип теперь ведет на главную -->
            <a href="index.html" class="logo">KristallCommunity</a>

            <!-- Кнопка Бургера (3 полоски, видны только на мобилках) -->
            <button class="burger-menu" id="burger-btn" aria-label="Открыть меню">
                <span></span>
                <span></span>
                <span></span>
            </button>

            <!-- Меню сайта (на ПК — строка, на мобилках — выезжающая панель) -->
            <nav id="nav-menu">
                <!-- Блок будущего профиля (виден только на мобилках внутри меню) -->
                <div class="menu-profile">
                    <img src="https://flaticon.com" alt="User Avatar" class="menu-avatar">
                    <span class="menu-username">Гость</span>
                </div>
                <ul>
                    <li><a href="index.html">Главная</a></li>
                    <li><a href="projects.html">Проекты</a></li>
                </ul>
            </nav>
        </div>
    </header>


    <!-- ХАБ ИГР И ПРИЛОЖЕНИЙ -->
    <div class="container" style="margin-top: 40px; margin-bottom: 60px; font-family: sans-serif;">
        <h2 class="section-title">Каталог игр и приложений</h2>
        <p style="color: #9ca3af; margin-bottom: 30px;">Здесь собраны все наши уникальные разработки для мобильных устройств и ПК. Выберите проект, чтобы узнать подробности и скачать.</p>

        <!-- ПАНЕЛЬ ПОИСКА И ФИЛЬТРОВ -->
        <div class="filter-panel" style="margin-bottom: 30px; display: flex; flex-direction: column; gap: 15px; font-family: sans-serif;">

            <!-- Строка текстового поиска -->
            <input type="text" id="search-input" placeholder="Поиск по названию проекта..." style="width: 100%; max-width: 400px; padding: 12px 15px; background-color: #1f2937; border: 1px solid #374151; color: white; border-radius: 8px; font-size: 15px; box-sizing: border-box; outline: none; transition: border-color 0.3s;">

            <!-- Кнопки-фильтры -->
            <div class="filter-group" style="display: flex; flex-wrap: wrap; gap: 10px;">
                <!-- Фильтры по типу -->
                <button class="filter-btn active" data-filter-type="all">Все типы</button>
                <button class="filter-btn" data-filter-type="mobile">Игры</button>
                <button class="filter-btn" data-filter-type="app">Приложения</button>

                <span style="color: #4b5563; align-self: center; margin: 0 5px;">|</span>

                <!-- Фильтры по платформе -->
                <button class="filter-btn active" data-filter-plat="all">Все платформы</button>
                <button class="filter-btn" data-filter-plat="Android">Android</button>
                <button class="filter-btn" data-filter-plat="Windows">Windows</button>
            </div>
        </div>

        <!-- Сетка карточек (сюда JS загрузит список из games.json) -->
        <div class="grid" id="projects-grid"></div>
    </div>

    <!-- ПОДВАЛ -->
    <footer>
        <div class="container">
            <p>&copy; 2026 KristallCommunity. Все права защищены.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
