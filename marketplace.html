<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Магазин - KristallCommunity</title>
    <link rel="icon" type="image/png" href="favicon.png" />
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="css/decorations.css">
    <style>
        .market-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; margin-top: 30px; }
        .product-card { background-color: #111827; border: 1px solid #1f2937; border-radius: 12px; padding: 20px; text-align: center; box-shadow: 0 0 15px rgba(34, 211, 238, 0.02); display: flex; flex-direction: column; justify-content: space-between; transition: 0.2s; }
        .product-card:hover { border-color: #22d3ee; box-shadow: 0 0 15px rgba(34, 211, 238, 0.1); }
        .product-icon { font-size: 40px; margin-bottom: 10px; display: block; }
        .product-title { color: white; font-size: 16px; font-weight: bold; margin: 5px 0; }
        .product-desc { color: #6b7280; font-size: 12px; margin: 5px 0 15px 0; min-height: 32px; }
        .product-footer { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid #1f2937; padding-top: 12px; }
        .product-price { color: #10b981; font-weight: bold; font-size: 14px; display: flex; align-items: center; gap: 4px; }
        .coin-icon { display: inline-block; width: 10px; height: 10px; background-color: #f59e0b; border-radius: 50%; box-shadow: 0 0 6px #f59e0b; }
    </style>
</head>
<body>

    <!-- НАВИГАЦИЯ -->
    <header>
        <div class="container header-wrapper" style="display: flex; justify-content: space-between; align-items: center; position: relative;">
            <a href="index.html" class="logo">KristallCommunity</a>
            <div style="display: flex; align-items: center; gap: 20px;">
                <nav id="nav-menu">
                    <div class="menu-profile mobile-profile-block" style="display: none; align-items: center; gap: 10px; padding-bottom: 20px; border-bottom: 1px solid #1f2937; margin-bottom: 20px; cursor: pointer;">
                        <span id="header-avatar-img-mobile"></span>
                        <span class="menu-username" id="header-username-mobile">Гость</span>
                    </div>
                    <ul>
                        <li><a href="index.html">Главная</a></li>
                        <li><a href="projects.html">Проекты</a></li>
                        <li><a href="marketplace.html" class="active">Магазин</a></li>
                    </ul>
                </nav>
                <div class="pc-profile-block" id="user-profile-block" style="display: flex; align-items: center; gap: 10px; cursor: pointer;">
                    <span id="header-avatar-img-pc"></span>
                    <span class="menu-username" id="header-username" style="color: white; font-weight: bold; font-size: 14px;">Гость</span>
                </div>
                <button class="burger-menu" id="burger-btn" aria-label="Открыть меню">
                    <span></span><span></span><span></span>
                </button>
            </div>
        </div>
    </header>

    <!-- ТЕЛО МАГАЗИНА -->
    <div class="container" style="margin-top: 40px; margin-bottom: 50px;">
        <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; margin-bottom: 10px;">
            <h2 class="section-title" style="margin: 0;">Маркетплейс предметов Kristall</h2>
            
            <!-- Индикатор баланса прямо на странице магазина -->
            <div style="background-color: #111827; border: 1px solid #1f2937; padding: 8px 15px; border-radius: 20px; font-size: 14px; font-weight: 600; color: #9ca3af; display: flex; align-items: center; gap: 6px;">
                <span>Мой баланс:</span>
                <span id="market-balance-num" style="color: #10b981; font-weight: bold;">0</span>
                <span class="coin-icon"></span>
            </div>
        </div>

        <!-- ПАНЕЛЬ ПОИСКА И ФИЛЬТРОВ МАГАЗИНА -->
        <div class="filter-panel" style="margin-bottom: 30px; display: flex; flex-direction: column; gap: 15px; font-family: sans-serif;">
            <input type="text" id="market-search-input" placeholder="Поиск предметов по названию..." style="width: 100%; max-width: 400px; padding: 12px 15px; background-color: #1f2937; border: 1px solid #374151; color: white; border-radius: 8px; font-size: 15px; box-sizing: border-box; outline: none; transition: border-color 0.3s;">

            <div class="filter-group" style="display: flex; flex-wrap: wrap; gap: 10px;">
                <button class="filter-btn active" data-market-filter="all">Все категории</button>
                <button class="filter-btn" data-market-filter="item">Цифровые предметы</button>
                <button class="filter-btn" data-market-filter="role">Уникальные роли</button>
            </div>
        </div>

        <!-- СЕТКА С ТОВАРАМИ -->
        <div class="market-grid" id="marketplace-grid">
            <!-- Сюда JavaScript будет выводить карточки товаров -->
        </div>
    </div>

    <!-- ВЕЛИКАЯ СВЯЗКА СКРИПТОВ KRISTALL (СТРОГИЙ ПОРЯДОК ПОДКЛЮЧЕНИЯ!) -->
    <script src="js/core.js"></script>
    <script src="js/content.js"></script>
    <script src="js/interface.js"></script>
    <script src="js/app.js"></script>

    <!-- ОКНО ПОДТВЕРЖДЕНИЯ ПОКУПКИ (STEAM & DISCORD STYLE) -->
    <div id="confirm-modal" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(3, 7, 18, 0.85); display: none; justify-content: center; align-items: center; z-index: 10000; font-family: sans-serif; backdrop-filter: blur(5px);">
        <div style="background-color: #111827; border: 1px solid #1f2937; border-radius: 16px; width: 100%; max-width: 650px; display: flex; overflow: hidden; box-shadow: 0 0 40px rgba(34, 211, 238, 0.15); min-height: 320px;">
            
            <!-- ЛЕВАЯ СТОРОНА: ОГРОМНЫЙ ДЕМОНСТРАЦИОННЫЙ СТЕНД -->
            <div style="flex: 1.1; background-color: #070a12; display: flex; align-items: center; justify-content: center; padding: 40px; border-right: 1px solid #1f2937; position: relative;">
                <!-- Увеличили круг превью до 130px, чтобы рамку можно было рассмотреть в деталях -->
                <div id="modal-preview-zone" style="width: 130px; height: 130px; border-radius: 50%; background: #1f2937; display: flex; align-items: center; justify-content: center; transition: 0.3s; box-sizing: border-box;">
                    <span style="font-size: 42px; opacity: 0.2;">👾</span>
                </div>
            </div>

            <!-- ПРАВАЯ СТОРОНА: ИНФОРМАЦИЯ И СИНХРОННЫЕ КНОПКИ -->
            <div style="flex: 1.3; padding: 35px; display: flex; flex-direction: column; justify-content: space-between; gap: 20px; background-color: #111827;">
                <div>
                    <h3 id="modal-product-title" style="color: white; margin: 0 0 12px 0; font-size: 22px; font-weight: bold; font-family: sans-serif; letter-spacing: 0.5px;">Название товара</h3>
                    
                    <!-- ЗАЩИТА ОТ ДЛИННОГО ТЕКСТА: Ограничение высоты + умный скрытый скроллбар -->
                    <div style="max-height: 110px; overflow-y: auto; padding-right: 5px; scrollbar-width: thin;">
                        <p id="modal-product-desc" style="color: #9ca3af; margin: 0; font-size: 14px; line-height: 1.6; font-family: sans-serif;"></p>
                    </div>
                </div>

                <!-- КНОПКИ С ОДИНАКОВЫМ ГЕЙМЕРСКИМ ЗАКРУГЛЕНИЕМ В 8px -->
                <div style="display: flex; flex-direction: column; gap: 12px; width: 100%;">
                    <button id="modal-confirm-btn" class="auth-submit-btn" style="width: 100%; padding: 12px; font-weight: bold; font-size: 14px; background-color: #10b981; color: white; border-radius: 8px; border: none; cursor: pointer; transition: 0.2s;">Подтвердить покупку</button>
                    
                    <button id="modal-cancel-btn" class="action-btn" style="width: 100%; padding: 12px; font-weight: bold; font-size: 14px; justify-content: center; background-color: #1f2937; border: 1px solid #374151; color: #9ca3af; border-radius: 8px;" onmouseenter="this.style.borderColor='#ef4444'; this.style.color='#ef4444'; this.style.background='#111827';" onmouseleave="this.style.borderColor='#374151'; this.style.color='#9ca3af'; this.style.background='#1f2937';">Отмена</button>
                </div>
            </div>

        </div>
    </div>

    <!-- Контейнер для красивых уведомлений сайта -->
    <div id="kristall-toast"></div>
</body>
</html>
